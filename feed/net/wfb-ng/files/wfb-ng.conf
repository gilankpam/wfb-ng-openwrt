# wfb-ng cluster NODE config. Sourced by /usr/sbin/wfb-ng.sh.
# This device forwards raw 802.11 to the aggregator host (which holds the key
# and decrypts); no key lives here. Mirrors the multi-stream node profile
# (video + mavlink + tunnel). Edit, then: /usr/sbin/wfb-ng.sh restart

# --- Radio (must match the air unit) ---
CHANNEL=132          # 5 GHz channel number
BW=HT20              # HT20 | HT40+ | HT40-
REG=US               # regulatory domain (your legal responsibility)
TXPOWER=             # fixed TX power in mBm (e.g. 2000 = 20 dBm); empty = driver default

# --- Link / aggregator (must match the air unit + host) ---
LINK_ID=7669206          # 24-bit wifibroadcast link id (hash of link_domain 'default')
HOST_ADDR=192.168.1.10   # host running the wfb-ng aggregator (wfb_rx -a)

# --- Downlink forwarders: "radio_port:host_udp_port" per stream ---
#   0=video  16=mavlink  32=tunnel
RX_STREAMS="0:10000 16:10001 32:10002"
RX_EXTRA_ARGS=

# --- Uplink injectors: local UDP ports the host injects raw frames to ---
#   11001=mavlink  11002=tunnel  (leave empty to disable the uplink)
TX_PORTS="11001 11002"
TX_EXTRA_ARGS=
