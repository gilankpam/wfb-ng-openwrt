# GS cluster-test overrides, layered on wfb-ng's built-in master.cfg.
# Distributed/cluster mode: the CPE510 (ath9k) is a NODE that forwards raw 802.11
# to this host; this host aggregates + FEC-decodes + decrypts (gs.key) and serves
# wfb-cli stats (with the now-working SNR).

[common]
wifi_channel = 132        # 5660 MHz (DFS). GS receives passively; drone TX must match.
wifi_region = 'US'        # CRDA region the node's `iw reg set` uses.

[cluster]

# One node: the CPE510. OpenWrt >= 24.10 doesn't create wlan0 until asked, so the
# custom_init_script makes the monitor vif before wfb-ng starts on the node.
nodes = {
          '192.168.1.1': { 'wlans': ['wlan0'],
                           'wifi_txpower': None,
                           'custom_init_script': 'iw phy phy0 interface add wlan0 type monitor flags otherbss || true' },
        }

server_address = '192.168.1.10'  # this PC (enp12s0), reachable from the node.

# Manual mode: this host does NOT ssh into the node (OpenWrt has no bash).
# Generate the node script with `--gen-init 192.168.1.1`, adapt to ash, run on the node.
ssh_user = None
ssh_port = None
